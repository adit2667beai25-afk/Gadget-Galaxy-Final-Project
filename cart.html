<!DOCTYPE html>
<html>

<head>

  <title>Shopping Cart</title>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <!-- Bootstrap -->

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- CSS -->

  <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

  <div class="container">

    <a class="navbar-brand">

      Gadget Galaxy

    </a>

    <div>

      <a class="nav-link text-white d-inline mx-2" href="index.html">
        Home
      </a>

      <a class="nav-link text-white d-inline mx-2" href="products.html">
        Products
      </a>

      <a class="nav-link text-white d-inline mx-2" href="about.html">
        About
      </a>

      <a class="nav-link text-white d-inline mx-2" href="contact.html">
        Contact
      </a>

    </div>

  </div>

</nav>

<!-- CART -->

<div class="container mt-5">

  <h1 class="text-center mb-4">

    🛒 Shopping Cart

  </h1>

  <!-- CART ITEMS -->

  <div id="cartItems"></div>

  <!-- EMPTY MESSAGE -->

  <h4
    id="emptyMessage"
    class="text-center text-danger"
  >

    Your cart is empty.

  </h4>

  <!-- SUMMARY -->

  <div class="cart-summary mt-4 text-center">

    <h4>

      Total Items:
      <span id="totalItems">0</span>

    </h4>

    <h4>

      Total Price:
      <span id="totalPrice">0₸</span>

    </h4>

  </div>

  <!-- BUTTONS -->

  <div class="text-center mt-4">

    <button
      class="btn btn-danger"
      onclick="clearCart()"
    >

      Clear Cart

    </button>

    <a
      href="products.html"
      class="btn btn-primary"
    >

      Continue Shopping

    </a>

  </div>

</div>

<!-- FOOTER -->

<footer class="bg-dark text-white text-center p-3 mt-5">

  © 2026 Gadget Galaxy

</footer>

<script src="script.js"></script>

</body>
</html>
